name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Validate OKF bundle
        run: python validate_okf.py

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=. --cov-report=term-missing --cov-fail-under=70
