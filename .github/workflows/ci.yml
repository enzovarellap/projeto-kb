name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python validate_okf.py
      - run: pytest tests/ -v --tb=short

  validate-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install python-frontmatter
      - run: python validate_okf.py

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test, validate-bundle]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t projeto-kb:test .
      - run: |
          docker run -d --name kb-test -p 8000:8000 projeto-kb:test
          sleep 5
          python healthcheck.py || (docker logs kb-test && exit 1)
          docker stop kb-test
